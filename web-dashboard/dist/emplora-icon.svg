<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6EF6"/>
      <stop offset="100%" style="stop-color:#4A90E2"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97060"/>
      <stop offset="100%" style="stop-color:#FBAF3F"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dde3ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="140" height="140" rx="32" fill="url(#bgGrad)"/>

  <!-- Letter E: vertical spine -->
  <rect x="30" y="28" width="18" height="84" rx="9" fill="url(#letterGrad)"/>

  <!-- Top bar -->
  <rect x="30" y="28" width="62" height="18" rx="9" fill="url(#letterGrad)"/>

  <!-- Bottom bar -->
  <rect x="30" y="94" width="62" height="18" rx="9" fill="url(#letterGrad)"/>

  <!-- Middle bar — replaced by coral/orange pill accent -->
  <rect x="30" y="61" width="52" height="18" rx="9" fill="url(#pillGrad)"/>

  <!-- Small dot accent -->
  <circle cx="106" cy="70" r="7" fill="#FBAF3F" opacity="0.85"/>
</svg>
