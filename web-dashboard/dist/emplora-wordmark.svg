<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" width="440" height="110">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B6EF6"/>
      <stop offset="100%" style="stop-color:#4A90E2"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97060"/>
      <stop offset="100%" style="stop-color:#FBAF3F"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dde3ff"/>
    </linearGradient>
  </defs>

  <!-- Icon background square -->
  <rect x="0" y="5" width="100" height="100" rx="24" fill="url(#bgGrad)"/>

  <!-- E: vertical spine -->
  <rect x="20" y="20" width="13" height="68" rx="6.5" fill="url(#letterGrad)"/>

  <!-- E: top bar -->
  <rect x="20" y="20" width="46" height="13" rx="6.5" fill="url(#letterGrad)"/>

  <!-- E: bottom bar -->
  <rect x="20" y="75" width="46" height="13" rx="6.5" fill="url(#letterGrad)"/>

  <!-- E: middle coral pill -->
  <rect x="20" y="48" width="38" height="13" rx="6.5" fill="url(#pillGrad)"/>

  <!-- Dot -->
  <circle cx="67" cy="54.5" r="5.5" fill="#FBAF3F" opacity="0.9"/>

  <!-- "mplora" all in orange gradient -->
  <text
    x="112"
    y="82"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="62"
    font-weight="800"
    letter-spacing="-2"
    fill="url(#pillGrad)"
  >mplora</text>

</svg>
